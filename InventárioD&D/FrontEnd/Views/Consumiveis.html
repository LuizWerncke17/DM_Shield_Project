<link rel="stylesheet" href="/FrontEnd/CSS/enemies.css">

<div>
    <div class="pagesHeader">
        <h1 class="font">Consumíveis</h1>
        <a href="" ng-click="abrirCriacaoConsumivel()" class="addButton">Adicionar Consumível</a>
    </div>

    <div class="filtros">

        <input type="text"
            ng-model="buscaNome"
            placeholder="Buscar Consumível..."
            class="inputFiltro">

        <select ng-model="buscaTipo" class="selectFiltro">
            <option value="">Selecione um tipo</option>
            <option value="Pocao">Poção</option>
            <option value="Refeicao">Refeição</option>
            <option value="Lanche">Lanche</option>
            <option value="Bebida">Bebida</option>
            <option value="Outro">Outro</option>
        </select>

    </div>

    <br><br>

    <div class="containerDivs">

        <div ng-repeat="c in consumiveis | filter:{nome: buscaNome} | filter:filtroTipoConsumivel" class="ficha">

            <div class="title">
                <h1>{{c.nome}}</h1>
            </div>

            <h5 class="enemiesTipe" style="color: darkgrey;">
                {{c.tipo}}
            </h5>

            <div class="enemyActions">
                <button ng-click="editarConsumivel(c)" class="enemyActionButton edit">Editar</button>
                <button ng-click="removerConsumivel(c)" class="enemyActionButton remove">Remover</button>
            </div>

            <hr>

            <p><strong>Duração:</strong> {{c.duracao}}</p>
            <p><strong>Valor:</strong> {{c.valor}}</p>

            <hr>

            <h3>Descrição</h3>
            <p class="texto-formatado">{{c.descricao}}</p>

            <h3>Efeito</h3>
            <p class="texto-formatado">{{c.efeito}}</p>

        </div>

    </div>
</div>
